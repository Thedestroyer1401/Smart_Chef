<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

<div class="container">

  <!-- Left Side Image -->
  <div class="left">
    <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="Food Image">
  </div>

  <!-- Right Side Form -->
  <div class="right">
    <div class="form-box">
      <h1>Create Account 👨‍🍳</h1>

      <form method="post">
        
        <div class="input-box">
          <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-box">
          <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-box">
          <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="input-box">
          <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        </div>

        <button type="submit">Register</button>

      </form>

      <p class="login-text">
        Already have an account? <a href="C:\xampp\htdocs\smart chef ai\smart-chief-plan-main\login.html">Login</a>
      </p>
    </div>
  </div>

</div>
